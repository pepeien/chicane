services:
  compiler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VULKAN_SOURCE: "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe"
    image: chicane-windows
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ../../../:/src
    environment:
      OPENGL_MAJOR_VERSION: 4
      OPENGL_MINOR_VERSION: 6

      VULKAN_MAJOR_VERSION: 1
      VULKAN_MINOR_VERSION: 3
      VULKAN_PATCH_VERSION: 296
    command: >
      bash -c "cmake -S . -B build-docker-windows -G 'Ninja' \
      -DCMAKE_TOOLCHAIN_FILE='/opt/mingw.toolchain.cmake' \
      -DCMAKE_BUILD_TYPE=Release \
      -DCMAKE_EXE_LINKER_FLAGS='-static-libgcc -static-libstdc++' \
      -DCMAKE_SHARED_LINKER_FLAGS='-static-libgcc -static-libstdc++' \
      -DCMAKE_MODULE_LINKER_FLAGS='-static-libgcc -static-libstdc++' \
      -DCHICANE_BUILD_DIR='Binaries/Docker-Windows' \
      -DCHICANE_SHARED=ON \
      -DCHICANE_OPENGL=ON \
      -DCHICANE_OPENGL_MAJOR_VERSION=$$OPENGL_MAJOR_VERSION \
      -DCHICANE_OPENGL_MINOR_VERSION=$$OPENGL_MINOR_VERSION \
      -DCHICANE_VULKAN=ON \
      -DCHICANE_VULKAN_MAJOR_VERSION=$$VULKAN_MAJOR_VERSION \
      -DCHICANE_VULKAN_MINOR_VERSION=$$VULKAN_MINOR_VERSION \
      -DCHICANE_VULKAN_PATCH_VERSION=$$VULKAN_PATCH_VERSION \
      && cmake --build build-docker-windows --config Release"